[pytest]
# Register custom markers used in this repo.
markers =
    integration: integration tests that require docker services

# Reduce noise from third-party deprecations (Python 3.12 datetime UTC changes).
# We keep deprecations from *our* code visible by scoping to known modules.
filterwarnings =
    ignore:datetime\.datetime\.utcnow\(\) is deprecated.*:DeprecationWarning:rq\..*
