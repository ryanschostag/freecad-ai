services:
  api:
    build: ./services/api
    ports:
      - "8080:8080"
    environment:
      - DATABASE_URL=postgresql+psycopg://cad:cad@db:5432/cad
      - ARTIFACT_STAGING_DIR=/artifacts_staging
      - RAG_SOURCES_CONFIG=/config/rag_sources.yaml
      - LLM_BASE_URL=http://llm:8000
      - REDIS_URL=redis://redis:6379/0

      # MinIO (S3-compatible)
      - STORAGE_MODE=minio
      - S3_ENDPOINT=http://minio:9000
      - S3_ACCESS_KEY=minioadmin
      - S3_SECRET_KEY=minioadmin
      - S3_BUCKET=cad-artifacts
      - S3_REGION=us-east-1
    volumes:
      - artifacts_staging:/artifacts_staging
      - ragconfig:/config
    depends_on:
      - db
      - redis
      - minio
      - minio-init
      - freecad-worker

  db:
    image: pgvector/pgvector:pg16
    environment:
      - POSTGRES_USER=cad
      - POSTGRES_PASSWORD=cad
      - POSTGRES_DB=cad
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  minio:
    image: minio/minio:RELEASE.2024-12-18T13-15-44Z
    command: server /data --console-address ":9001"
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data

  minio-init:
    image: minio/mc:RELEASE.2024-11-21T17-21-54Z
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      until (/usr/bin/mc alias set local http://minio:9000 minioadmin minioadmin) do echo '...waiting for minio' && sleep 1; done;
      /usr/bin/mc mb --ignore-existing local/cad-artifacts;
      exit 0;
      "

  llm:
    profiles: ["cpu"]
    image: ghcr.io/ggml-org/llama.cpp:server
    command: >
      --host 0.0.0.0 --port 8000
      --model /models/model.gguf
      --threads 8
      --ctx-size 4096
    ports:
      - "8000:8000"
    volumes:
      - models:/models

  llm-cuda:
    profiles: ["gpu"]
    image: ghcr.io/ggml-org/llama.cpp:server-cuda
    command: >
      --host 0.0.0.0 --port 8000
      --model /models/model.gguf
      --threads 8
      --ctx-size 4096
      --n-gpu-layers 999
    ports:
      - "8000:8000"
    volumes:
      - models:/models
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  freecad-worker:
    build: ./services/freecad-worker
    environment:
      - DATABASE_URL=postgresql+psycopg://cad:cad@db:5432/cad
      - REDIS_URL=redis://redis:6379/0
      - LLM_BASE_URL=http://llm:8000
      - S3_ENDPOINT=http://minio:9000
      - S3_ACCESS_KEY=minioadmin
      - S3_SECRET_KEY=minioadmin
      - S3_BUCKET=cad-artifacts
      - S3_REGION=us-east-1
    volumes:
      - artifacts_staging:/artifacts_staging
    depends_on:
      - db
      - redis
      - minio
      - minio-init

volumes:
  pgdata:
  artifacts_staging:
  models:
  hfcache:
  ragconfig:
  miniodata:
