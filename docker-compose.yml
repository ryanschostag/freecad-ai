services:
  api:
    profiles: ["cpu", "gpu"]
    build: ./services/api
    ports:
      - "8080:8080"
    environment:
      - DATABASE_URL=postgresql+psycopg://cad:cad@db:5432/cad
      - ARTIFACT_STAGING_DIR=/artifacts_staging
      - RAG_SOURCES_CONFIG=/config/rag_sources.yaml
      - LLM_BASE_URL=http://llm:8000
      - API_BASE_URL=http://api:8080
      - REDIS_URL=redis://redis:6379/0

      # Model execution metadata (persisted into dim_model for metrics)
      - MODEL_ID=cpu-default
      - MODEL_BACKEND=llama.cpp
      - MODEL_DEVICE=cpu

      # MinIO (S3-compatible)
      - STORAGE_MODE=minio
      - S3_ENDPOINT=http://minio:9000
      - S3_ACCESS_KEY=${S3_ACCESS_KEY:-minioadmin}
      - S3_SECRET_KEY=${S3_SECRET_KEY:-minioadmin}
      - S3_BUCKET=cad-artifacts
      - S3_REGION=us-east-1
    volumes:
      - artifacts_staging:/artifacts_staging
      - ragconfig:/config
    depends_on:
      - db
      - redis
      - minio
      - minio-init
      - freecad-worker

  api-test:
    profiles: ["test"]
    build: ./services/api
    ports:
      - "8081:8080"
    environment:
      - DATABASE_URL=postgresql+psycopg://cad:cad@db:5432/cad
      - STORAGE_MODE=minio
      - ARTIFACT_STAGING_DIR=/artifacts_staging
      - RAG_SOURCES_CONFIG=/config/rag_sources.yaml
      - LLM_BASE_URL=http://llm-fake:8000
      - API_BASE_URL=http://api-test:8080
      - REDIS_URL=redis://redis:6379/0
      - S3_ENDPOINT=http://minio:9000
      - S3_ACCESS_KEY=${S3_ACCESS_KEY:-minioadmin}
      - S3_SECRET_KEY=${S3_SECRET_KEY:-minioadmin}
      - S3_BUCKET=cad-artifacts
      - S3_REGION=us-east-1

      # Model execution metadata for the test profile
      - MODEL_ID=test-default
      - MODEL_BACKEND=fake-llm
      - MODEL_DEVICE=cpu
    volumes:
      - artifacts_staging:/artifacts_staging
      - ragconfig:/config
    depends_on:
      - db
      - redis
      - minio
      - minio-init
      - freecad-worker-test

  # Run pytest inside Docker with all required services available.
  # Intended for CI/CD and local deterministic runs.
  test-runner:
    profiles: ["test"]
    image: python:3.12-slim
    working_dir: /repo
    environment:
      - CAD_AGENT_BASE_URL=http://api-test:8080
      - API_BASE_URL=http://api-test:8080
      - LLM_BASE_URL=http://llm-fake:8000
      - REDIS_URL=redis://redis:6379/0
      - DATABASE_URL=postgresql+psycopg://cad:cad@db:5432/cad
      - S3_ENDPOINT=http://minio:9000
      - S3_ACCESS_KEY=${S3_ACCESS_KEY:-minioadmin}
      - S3_SECRET_KEY=${S3_SECRET_KEY:-minioadmin}
      - S3_BUCKET=cad-artifacts
      - S3_REGION=us-east-1

      # Keep model metadata consistent with api-test
      - MODEL_ID=test-default
      - MODEL_BACKEND=fake-llm
      - MODEL_DEVICE=cpu
    volumes:
      - ./:/repo
    depends_on:
      - api-test
      - freecad-worker-test
      - db
      - redis
      - minio
      - minio-init
      - llm-fake
    command: >
      sh -c "
      pip install --no-cache-dir -r tests/requirements.txt &&
      pytest -vv --full-trace
      "

  db:
    image: pgvector/pgvector:pg16
    environment:
      - POSTGRES_USER=cad
      - POSTGRES_PASSWORD=cad
      - POSTGRES_DB=cad
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  minio:
    image: minio/minio:RELEASE.2024-12-18T13-15-44Z
    command: server /data --console-address ":9001"
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER:-minioadmin}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data

  minio-init:
    image: minio/mc:RELEASE.2024-11-21T17-21-54Z
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      until (/usr/bin/mc alias set local http://minio:9000 ${MINIO_ROOT_USER:-minioadmin} ${MINIO_ROOT_PASSWORD:-minioadmin}) do echo '...waiting for minio' && sleep 1; done;
      /usr/bin/mc mb --ignore-existing local/cad-artifacts;
      exit 0;
      "

  llm:
    container_name: freecad-ai-llm
    restart: unless-stopped
    profiles: ["cpu"]
    image: ghcr.io/ggml-org/llama.cpp:server
    command: >
      --host 0.0.0.0
      --port 8000
      --model /models/Qwen2.5-Coder-7B-Instruct-Q4_K_M.gguf
      --chat-template qwen2
      --threads 8
      --ctx-size 4096
    ports:
      - "8000:8000"
    volumes:
      - ./models:/models:ro

  llm-cuda:
    profiles: ["gpu"]
    image: ghcr.io/ggml-org/llama.cpp:server-cuda
    command: >
      --host 0.0.0.0 --port 8000
      --model /models/Qwen2.5-Coder-7B-Instruct-Q4_K_M.gguf
      --threads 8
      --ctx-size 4096
      --n-gpu-layers 999
    ports:
      - "8000:8000"
    volumes:
      - models:/models
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  llm-fake:
    container_name: freecad-ai-llm-fake
    restart: unless-stopped
    profiles: ["test"]
    image: python:3.11-slim
    working_dir: /app
    command: >
      sh -c "pip install --no-cache-dir fastapi==0.115.0 uvicorn==0.30.6 && uvicorn fake_llm_server:app --host 0.0.0.0 --port 8000"
    ports:
      - "8001:8000"
    volumes:
      - ./tools:/app:ro

  freecad-worker:
    profiles: ["cpu", "gpu"]
    build: ./services/freecad-worker
    environment:
      - DATABASE_URL=postgresql+psycopg://cad:cad@db:5432/cad
      - REDIS_URL=redis://redis:6379/0
      - LLM_BASE_URL=http://llm:8000
      - API_BASE_URL=http://api:8080
      # Model execution metadata (persisted into dim_model for metrics)
      - MODEL_ID=cpu-default
      - MODEL_BACKEND=llama.cpp
      - MODEL_DEVICE=cpu
      - S3_ENDPOINT=http://minio:9000
      - S3_ACCESS_KEY=${S3_ACCESS_KEY:-minioadmin}
      - S3_SECRET_KEY=${S3_SECRET_KEY:-minioadmin}
      - S3_BUCKET=cad-artifacts
      - S3_REGION=us-east-1
    volumes:
      - artifacts_staging:/artifacts_staging
    depends_on:
      - db
      - redis
      - minio
      - minio-init

  freecad-worker-test:
    profiles: ["test"]
    build: ./services/freecad-worker
    environment:
      - DATABASE_URL=postgresql+psycopg://cad:cad@db:5432/cad
      - REDIS_URL=redis://redis:6379/0
      - LLM_BASE_URL=http://llm-fake:8000
      - API_BASE_URL=http://api-test:8080
      # Model execution metadata for the test profile
      - MODEL_ID=test-default
      - MODEL_BACKEND=fake-llm
      - MODEL_DEVICE=cpu
      - S3_ENDPOINT=http://minio:9000
      - S3_ACCESS_KEY=${S3_ACCESS_KEY:-minioadmin}
      - S3_SECRET_KEY=${S3_SECRET_KEY:-minioadmin}
      - S3_BUCKET=cad-artifacts
      - S3_REGION=us-east-1
    volumes:
      - artifacts_staging:/artifacts_staging
    depends_on:
      - db
      - redis
      - minio
      - minio-init
      - llm-fake

volumes:
  pgdata: {}
  artifacts_staging: {}
  models: {}
  hfcache: {}
  ragconfig: {}
  miniodata: {}
