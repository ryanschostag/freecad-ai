openapi: 3.0.3
info:
  title: CAD Agent API
  version: 1.0.0
servers:
  - url: http://localhost:8080
paths:
  /v1/health:
    get:
      summary: Health check
      responses:
        "200":
          description: OK

  /v1/sessions:
    post:
      summary: Create a new session
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSessionRequest"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Session"

  /v1/sessions/{session_id}:
    get:
      summary: Get session details
      parameters:
        - $ref: "#/components/parameters/SessionId"
      responses:
        "200":
          description: Session
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SessionDetail"
        "404":
          description: Not found

  /v1/sessions/{session_id}/messages:
    post:
      summary: Send a prompt (continue session)
      parameters:
        - $ref: "#/components/parameters/SessionId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateMessageRequest"
      responses:
        "200":
          description: Assistant response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateMessageResponse"
        "404":
          description: Not found
        "409":
          description: Session closed

  /v1/sessions/{session_id}/end:
    post:
      summary: End/close a session
      parameters:
        - $ref: "#/components/parameters/SessionId"
      responses:
        "200":
          description: Closed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Session"
        "404":
          description: Not found

  /v1/sessions/{session_id}/fork:
    post:
      summary: Fork a session into a new session_id
      parameters:
        - $ref: "#/components/parameters/SessionId"
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ForkSessionRequest"
      responses:
        "201":
          description: Forked
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Session"
        "404":
          description: Not found

  /v1/sessions/{session_id}/logs:
    get:
      summary: Get structured logs for a session
      parameters:
        - $ref: "#/components/parameters/SessionId"
        - name: since
          in: query
          required: false
          schema:
            type: string
            format: date-time
      responses:
        "200":
          description: Log events
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LogEventList"
        "404":
          description: Not found

  /v1/sessions/{session_id}/metrics:
    get:
      summary: Get quick metrics for a session (prompts, completions, validations)
      parameters:
        - $ref: "#/components/parameters/SessionId"
      responses:
        "200":
          description: Metrics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SessionMetrics"
        "404":
          description: Not found

  /v1/artifacts/{artifact_id}:
    get:
      summary: Download an artifact OR get a presigned download URL
      parameters:
        - name: artifact_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Artifact
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
            application/json:
              schema:
                $ref: "#/components/schemas/ArtifactDownload"
        "404":
          description: Not found

  /v1/rag/sources:
    get:
      summary: List configured RAG sources (from DB)
      responses:
        "200":
          description: Sources
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SourceList"

  /v1/rag/sources/reconcile:
    post:
      summary: Reconcile rag_sources.yaml into DB (log source add/remove/update)
      responses:
        "200":
          description: Reconciled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReconcileResult"

  /v1/rag/ingest-runs:
    post:
      summary: Trigger ingest sync based on whitelist/blacklist config
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RunIngestRequest"
      responses:
        "202":
          description: Accepted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IngestRun"

  /v1/rag/ingest-runs/{run_id}:
    get:
      summary: Get ingest run status
      parameters:
        - name: run_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Ingest run
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IngestRun"
        "404":
          description: Not found

components:
  parameters:
    SessionId:
      name: session_id
      in: path
      required: true
      schema:
        type: string
        format: uuid

  schemas:
    CreateSessionRequest:
      type: object
      properties:
        title:
          type: string
        project_id:
          type: string
        preferences:
          $ref: "#/components/schemas/SessionPreferences"

    ForkSessionRequest:
      type: object
      properties:
        title:
          type: string
        carry_over_state:
          type: boolean
          default: true

    SessionPreferences:
      type: object
      properties:
        units:
          type: string
          enum: [mm, inch]
          default: mm
        tolerance_mm:
          type: number
          default: 0.2
        manufacturing_profile:
          type: string
          enum: [fdm_3d_print, sla_3d_print, cnc_basic]
          default: fdm_3d_print
        require_citations:
          type: boolean
          default: true
        require_freecad_validation:
          type: boolean
          default: true

    Session:
      type: object
      required: [session_id, status, created_at]
      properties:
        session_id:
          type: string
          format: uuid
        parent_session_id:
          type: string
          format: uuid
          nullable: true
        title:
          type: string
        project_id:
          type: string
          nullable: true
        status:
          type: string
          enum: [active, closed]
        created_at:
          type: string
          format: date-time
        closed_at:
          type: string
          format: date-time
          nullable: true

    SessionDetail:
      allOf:
        - $ref: "#/components/schemas/Session"
        - type: object
          properties:
            latest_state:
              $ref: "#/components/schemas/SessionState"
            recent_messages:
              type: array
              items:
                $ref: "#/components/schemas/Message"

    CreateMessageRequest:
      type: object
      required: [content]
      properties:
        content:
          type: string
        client_request_id:
          type: string
        mode:
          type: string
          enum: [design, modify, explain, export]
          default: design

    CreateMessageResponse:
      type: object
      required: [session_id, message_id, assistant_message, artifacts, citations, validation]
      properties:
        session_id:
          type: string
          format: uuid
        message_id:
          type: string
          format: uuid
        assistant_message:
          $ref: "#/components/schemas/Message"
        artifacts:
          type: array
          items:
            $ref: "#/components/schemas/Artifact"
        citations:
          type: array
          items:
            $ref: "#/components/schemas/Citation"
        validation:
          $ref: "#/components/schemas/ValidationSummary"

    Message:
      type: object
      required: [message_id, role, content, created_at]
      properties:
        message_id:
          type: string
          format: uuid
        role:
          type: string
          enum: [user, assistant, tool]
        content:
          type: string
        created_at:
          type: string
          format: date-time

    Artifact:
      type: object
      required: [artifact_id, kind, path, created_at]
      properties:
        artifact_id:
          type: string
          format: uuid
        kind:
          type: string
          enum: [freecad_macro_py, freecad_fcstd, step, stl, validation_report_json, qa_report_json]
        path:
          type: string
        created_at:
          type: string
          format: date-time
        sha256:
          type: string
        bytes:
          type: integer

    ArtifactDownload:
      type: object
      properties:
        artifact_id:
          type: string
          format: uuid
        download_url:
          type: string
          nullable: true
        expires_at:
          type: string
          format: date-time
          nullable: true

    Citation:
      type: object
      required: [source_id, chunk_id, locator]
      properties:
        source_id:
          type: string
        chunk_id:
          type: string
        locator:
          type: string
        quote:
          type: string

    ValidationSummary:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [passed, failed, skipped]
        iterations:
          type: integer
        issues:
          type: array
          items:
            type: string

    SessionState:
      type: object
      properties:
        parameters:
          type: object
          additionalProperties: true
        feature_tree:
          type: array
          items:
            type: string
        notes:
          type: string

    LogEventList:
      type: object
      required: [events]
      properties:
        events:
          type: array
          items:
            $ref: "#/components/schemas/LogEvent"

    LogEvent:
      type: object
      required: [event_id, session_id, ts, type]
      properties:
        event_id:
          type: string
          format: uuid
        session_id:
          type: string
          format: uuid
        ts:
          type: string
          format: date-time
        type:
          type: string
        payload:
          type: object
          additionalProperties: true

    SessionMetrics:
      type: object
      required: [session_id, prompts, completions, validations]
      properties:
        session_id:
          type: string
          format: uuid
        prompts:
          type: integer
        completions:
          type: integer
        validations:
          type: integer

    SourceList:
      type: object
      required: [sources]
      properties:
        sources:
          type: array
          items:
            $ref: "#/components/schemas/Source"

    Source:
      type: object
      required: [source_id, enabled, trust_tier, kind]
      properties:
        source_id:
          type: string
        enabled:
          type: boolean
        blacklisted:
          type: boolean
        trust_tier:
          type: integer
        kind:
          type: string
          enum: [crawl, sitemap, pdf_list, github_repo]
        entrypoints:
          type: array
          items:
            type: string
        include_patterns:
          type: array
          items:
            type: string
        exclude_patterns:
          type: array
          items:
            type: string
        license_note:
          type: string

    ReconcileResult:
      type: object
      required: [added, updated, disabled]
      properties:
        added:
          type: array
          items: { type: string }
        updated:
          type: array
          items: { type: string }
        disabled:
          type: array
          items: { type: string }

    RunIngestRequest:
      type: object
      properties:
        source_ids:
          type: array
          items:
            type: string
        force:
          type: boolean
          default: false

    IngestRun:
      type: object
      required: [run_id, status, created_at]
      properties:
        run_id:
          type: string
          format: uuid
        status:
          type: string
          enum: [queued, running, done, failed]
        created_at:
          type: string
          format: date-time
        finished_at:
          type: string
          format: date-time
          nullable: true
        summary:
          type: object
          additionalProperties: true
