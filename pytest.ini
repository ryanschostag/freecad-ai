[pytest]
# Default configuration for running tests *inside* the docker "test" profile.
#
# Typical workflow:
#   docker compose --profile test up -d --build
#   docker compose --profile test exec api-test pytest -vv --full-trace

markers =
    integration: requires running docker services (api, db, redis, worker)

env =
    CAD_AGENT_BASE_URL=http://localhost:8080
